<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paketspåraren</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <div class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0v10l-8 4m0-14L4 7m8 4v10" />
    </svg>
  </div>
  <div>
    <h1>Paketspåraren</h1>
    <p>Håll koll på alla dina leveranser</p>
  </div>
</header>

<main>

  <!-- Lägg till paket -->
  <div class="add-card">
    <h2>Lägg till paket</h2>
    <div class="input-row">
      <input
        id="input-number"
        type="text"
        placeholder="Spårningsnummer"
        autocomplete="off"
        spellcheck="false"
      />
      <input
        id="input-name"
        type="text"
        placeholder="Namn (valfritt)"
        autocomplete="off"
      />
      <select id="input-carrier">
        <option value="">Auto-detect</option>
        
        <!-- Sverige -->
        <optgroup label="Sverige">
          <option value="airmee">Airmee</option>
          <option value="19241">PostNord Sweden</option>
          <option value="3031">PostNord</option>
          <option value="100002">DHL Sweden</option>
          <option value="3413">DB Schenker</option>
          <option value="190355">Bring</option>
          <option value="190284">Budbee</option>
          <option value="190268">Instabox</option>
          <option value="3171">GLS</option>
          <option value="3031">DPD</option>
        </optgroup>
        
        <!-- Nordiska länder -->
        <optgroup label="Nordiska länder">
          <option value="4011">PostNord Danmark</option>
          <option value="14081">Posten Norge</option>
          <option value="6041">Posti (Finland)</option>
          <option value="9011">Iceland Post</option>
        </optgroup>
        
        <!-- Europa -->
        <optgroup label="Europa">
          <option value="7041">DHL (Germany)</option>
          <option value="7044">Deutsche Post</option>
          <option value="14041">PostNL</option>
          <option value="11031">Royal Mail</option>
          <option value="11033">Parcelforce</option>
          <option value="5051">La Poste / Colissimo</option>
          <option value="19181">Correos de España</option>
          <option value="9071">Poste Italiane</option>
          <option value="16081">Poczta Polska</option>
          <option value="19141">Slovenská pošta</option>
          <option value="19151">Pošta Slovenije</option>
          <option value="12081">Lietuvos paštas</option>
          <option value="12021">Latvijas Pasts</option>
          <option value="5041">Omniva</option>
          <option value="18021">Poșta Română</option>
          <option value="18031">Russian Post</option>
          <option value="19251">Swiss Post</option>
          <option value="3221">Česká pošta</option>
          <option value="2191">Hrvatska pošta</option>
          <option value="2171">Bulgarian Posts</option>
          <option value="7071">ELTA Hellenic Post</option>
        </optgroup>
        
        <!-- Globala -->
        <optgroup label="Globala">
          <option value="21051">USPS</option>
          <option value="10021">Japan Post</option>
          <option value="3011">China Post</option>
          <option value="3013">China EMS</option>
          <option value="20011">Chunghwa Post</option>
          <option value="13051">Pos Malaysia</option>
          <option value="16071">Philippine Postal</option>
          <option value="19171">South African Post</option>
          <option value="21021">Ukrposhta</option>
        </optgroup>
        
        <!-- Express & Kurir -->
        <optgroup label="Express & Kurir">
          <option value="10211">FedEx</option>
          <option value="10212">FedEx Ground</option>
          <option value="10213">UPS</option>
          <option value="10215">TNT</option>
          <option value="10216">Aramex</option>
          <option value="10217">DHL Express</option>
          <option value="10221">Hermes</option>
          <option value="10222">Toll Global Express</option>
          <option value="10223">Yanwen</option>
          <option value="10224">4PX</option>
          <option value="10225">Cainiao</option>
        </optgroup>
      </select>
      <button id="btn-add" class="btn btn-primary">Lägg till</button>
    </div>
    <div id="add-msg" class="msg"></div>
  </div>

  <!-- Paketlista -->
  <div class="section-header">
    <h2>Mina paket</h2>
    <button id="btn-refresh" class="btn btn-refresh">
      Uppdatera alla
    </button>
  </div>

  <div id="pkg-list"></div>

</main>

<script src="js/app.js"></script>
</body>
</html>
