<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paketspåraren</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <div class="logo">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0v10l-8 4m0-14L4 7m8 4v10" />
    </svg>
  </div>
  <div>
    <h1>Paketspåraren</h1>
    <p>Håll koll på alla dina leveranser</p>
  </div>
</header>

<main>

  <!-- Lägg till paket -->
  <div class="add-card">
    <h2>Lägg till paket</h2>
    <div class="input-row">
      <input
        id="input-number"
        type="text"
        placeholder="Spårningsnummer"
        autocomplete="off"
        spellcheck="false"
      />
      <input
        id="input-name"
        type="text"
        placeholder="Namn (valfritt)"
        autocomplete="off"
      />
      <select id="input-carrier">
        <option value="">Auto-detect</option>
        <option value="airmee">Airmee</option>
        <option value="3031">PostNord</option>
        <option value="100002">DHL Sweden</option>
        <option value="3413">DB Schenker</option>
        <option value="190355">Bring</option>
        <option value="190284">Budbee</option>
        <option value="190268">Instabox</option>
        <option value="3171">GLS</option>
        <option value="3031">DPD</option>
      </select>
      <button id="btn-add" class="btn btn-primary">Lägg till</button>
    </div>
    <div id="add-msg" class="msg"></div>
  </div>

  <!-- Paketlista -->
  <div class="section-header">
    <h2>Mina paket</h2>
    <button id="btn-refresh" class="btn btn-refresh">
      <span id="refresh-spinner" class="spinner" hidden></span>
      Uppdatera alla
    </button>
  </div>

  <div id="pkg-list"></div>

</main>

<script src="js/app.js"></script>
</body>
</html>
